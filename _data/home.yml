# Startseite - Features

features:
  title: Sammlungen
  description: Entdecken Sie die biologischen Sammlungen am Haus der Natur

  features:
    - title: Entomologische Sammlung
      description: In der entomologischen Sammlung werden geschätzte 500.000 Insektenbelege aufbewahrt, die zu einem großen Teil im Bundesland Salzburg gesammelt wurden. Sie sind ein unersetzbares Archiv, dessen naturschutzfachlicher und wissenschaftlicher Wert unermesslich ist. Erkunde unsere Sammlung hier!
      background: assets/images/20221201_Carabus_splendens_HNS-Coleopt-3375.jpg
      href: /occurrence/search?datasetKey=c1492854-5d15-40e9-9ee7-24a18ac05112&basisOfRecord=PRESERVED_SPECIMEN&taxonKey=216&view=dashboard&%3D
  
    - title: Molluskensammlung
      description: In der malakologischen Sammlung werden etwa 55.000 Belegserien von Schnecken und Muscheln aus aller Welt aufbewahrt. Der Schwerpunkt der Sammlung liegt in Österreich und dem Bundesland Salzburg. Nähere Informationen finden sich auf der Seite der [Malakologischen Arbeitsgemeinschaft](https://www.hausdernatur.at/de/malakologie.html).
      background: assets/images/HNS-Malak-M_Sp05130_b.jpg
      href: occurrence/search?datasetKey=c1492854-5d15-40e9-9ee7-24a18ac05112&taxonKey=52&basisOfRecord=PRESERVED_SPECIMEN&view=dashboard&%3D

    - title: Herbarium SZB
      description: In den botanischen Sammlungen (Herbarium SZB) werden über 200.000 Belege von getrockneten Pflanzen, Pilzen und Flechten aufbewahrt.
      background: assets/images/Herbarium (2)_quer_Luigi_Caputo.jpg
      href: /Herbarium_SZB


