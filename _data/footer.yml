# Footer configuration
# You should create one of these files for each language you support. E.g. /_data/es/footer.yml for the spanish version of the footer
# Footer content is organized in columns.
# You can also add a small print license statement at the bottom.

# Columns (the more you add, the narrower they will be)
columns:

  - name: Partnerorganisationen
    description: |
      ![Land Salzburg](/assets/logos/logo_land_salzburg.png)
      
  - name:
    description: | # Can be Markdown and multiline as shown here. 
      ![Nationalpark Hohe Tauern](/assets/logos/Nationalpark_Hohe_Tauern_logo.svg.png)

      ![GBIF Austria](/assets/logos/GBIF-Austria_Logo_RGB_Nachbau_Blau.jpg)
      
  - name:
    description: | # Can be Markdown and multiline as shown here. 
      ![OSCA](/assets/logos/OSCA_logo_clip.png)
      
      [![Observation.org](/assets/logos/observation-logo2.png)](https://at.observation.org/)

  
  - name: Kontakt
    description: | # Can be Markdown
      Haus der Natur
      
      Museumsplatz 5
      
      5020 Salzburg
      
      Österreich

      [Website](https://www.hausdernatur.at/de/)
    connectIcons: true # Show social icons (defined in _config.yml)


